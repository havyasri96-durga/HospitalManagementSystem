<!DOCTYPE html>
<html>
<head>

<title>Doctors</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<a href="javascript:history.back()" class="back-btn">⬅ Back</a>

<h1>📋 All Doctors</h1>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Experience</th>

</tr>

{% for doctor in doctors %}

<tr>

<td>{{ doctor[0] }}</td>
<td>{{ doctor[1] }}</td>
<td>{{ doctor[2] }}</td>
<td>{{ doctor[3] }}</td>
<td>{{ doctor[4] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
