<!DOCTYPE html>
<html>
<head>

<title>Hospital Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>🏥 Hospital Management System</h1>

<div class="form-container">

<form action="/login" method="POST">

<label>Username</label>

<input type="text"
name="username"
required>

<label>Password</label>

<input type="password"
name="password"
required>

<input type="submit"
value="Login">

</form>

</div>

</body>
</html>
