<!DOCTYPE html>
<html>
<head>

<title>Update Patient</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>✏ Update Patient</h1>

<div class="form-container">

<form action="/updatepatientrecord" method="POST">

Patient ID

name="patient_id"

Patient Name

<input type="text"
name="patient_name"
required>

Phone

<input type="text"
name="phone"
required>

<input type="submit"
value="Update Patient">

</form>

</div>

</body>
</html>
