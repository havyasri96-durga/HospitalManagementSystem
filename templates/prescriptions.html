<!DOCTYPE html>
<html>
<head>

<title>Prescriptions</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<a href="javascript:history.back()" class="back-btn">⬅ Back</a>

<h1>All Prescriptions</h1>

<table>

<tr>

<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Diagnosis</th>
<th>Medicine</th>
<th>Date</th>

</tr>

{% for p in prescriptions %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
