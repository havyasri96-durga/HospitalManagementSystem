<!DOCTYPE html>
<html>
<head>

<title>Update Doctor</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<a href="javascript:history.back()" class="back-btn">⬅ Back</a>

<h1>✏ Update Doctor</h1>

<div class="form-container">

<form action="/updatedoctorrecord" method="POST">

Doctor ID

<input type="number"
name="doctor_id"
required>

Doctor Name

<input type="text"
name="doctor_name"
required>

Phone

<input type="text"
name="phone"
maxlength="10"
pattern="[0-9]{10}"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
required>

<input type="submit"
value="Update Doctor">

</form>

</div>

</body>
</html>
