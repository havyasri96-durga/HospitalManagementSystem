<!DOCTYPE html>
<html>
<head>

<title>Patients</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<a href="javascript:history.back()" class="back-btn">⬅ Back</a>

<h1>📋 All Patients</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Disease</th>

</tr>

{% for patient in patients %}

<tr>

<td>{{ patient[0] }}</td>
<td>{{ patient[1] }}</td>
<td>{{ patient[2] }}</td>
<td>{{ patient[3] }}</td>
<td>{{ patient[4] }}</td>
<td>{{ patient[5] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
