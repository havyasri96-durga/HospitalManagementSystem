<!DOCTYPE html>

<html>

<head>

<title>Generate Prescription</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<div class="logo">
🏥 SmartCare Hospital ERP
</div>

<div class="nav-links">
<a href="/doctordashboard">Dashboard</a>
</div>

</div>

<h1>Generate Prescription</h1>

<div class="form-container">

<form action="/saveprescription" method="POST">

<label>Patient Name</label> <input type="text"
name="patient_name"
required>

<label>Doctor Name</label> <input type="text"
name="doctor_name"
required>

<label>Disease</label>

<select
id="diagnosis"
name="diagnosis"
required>

<option value="">Select Disease</option>

<option value="Fever">Fever</option>
<option value="Cold">Cold</option>
<option value="Cough">Cough</option>
<option value="Headache">Headache</option>
<option value="Diabetes">Diabetes</option>
<option value="Hypertension">Hypertension</option>
<option value="Asthma">Asthma</option>
<option value="Allergy">Allergy</option>
<option value="Migraine">Migraine</option>
<option value="Gastritis">Gastritis</option>
<option value="Vomiting">Vomiting</option>
<option value="Diarrhea">Diarrhea</option>
<option value="Constipation">Constipation</option>
<option value="Anemia">Anemia</option>
<option value="Arthritis">Arthritis</option>
<option value="Back Pain">Back Pain</option>
<option value="Toothache">Toothache</option>
<option value="Ear Infection">Ear Infection</option>
<option value="Skin Infection">Skin Infection</option>
<option value="Fungal Infection">Fungal Infection</option>
<option value="Urinary Infection">Urinary Infection</option>
<option value="Bronchitis">Bronchitis</option>
<option value="Pneumonia">Pneumonia</option>
<option value="Thyroid">Thyroid</option>
<option value="Vitamin D Deficiency">Vitamin D Deficiency</option>
<option value="B12 Deficiency">B12 Deficiency</option>
<option value="Insomnia">Insomnia</option>
<option value="Dehydration">Dehydration</option>
<option value="Heartburn">Heartburn</option>

</select>

<label>Suggested Medicine</label>

<textarea
id="medicines"
name="medicines"
rows="4">
</textarea>

<label>Date</label>

<input
type="date"
name="prescription_date"
required>

<input
type="submit"
value="Generate Prescription">

</form>

</div>

<script>

document.getElementById("diagnosis").addEventListener("change", function(){

let disease = this.value;

fetch("/getmedicine/" + disease)

.then(response => response.json())

.then(data => {

document.getElementById("medicines").value =
data.medicines;

});

});

</script>

</body>
</html>
