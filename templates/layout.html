<!DOCTYPE html>
<html>
<head>

<title>{% block title %}{% endblock %}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f7fc;
}

.navbar{
    background:#1e293b;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 40px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logout{
    background:#ef4444;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}

.logout:hover{
    background:#dc2626;
}

.container{
    width:90%;
    margin:auto;
    padding:30px;
}

.page-title{
    text-align:center;
    margin-bottom:30px;
}

.page-title h1{
    color:#1e293b;
}

.page-title p{
    color:#64748b;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0px 5px 15px rgba(0,0,0,0.08);

    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin-bottom:15px;
}

.card p{
    margin-bottom:20px;
    color:#666;
}

.card a{
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}

.card a:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
🏥 SmartCare Hospital ERP
</div>

<a href="/" class="logout">
Logout
</a>

</div>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
